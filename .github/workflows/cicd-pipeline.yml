name: Healthcare DevOps Pipeline

on:
  push:
    branches: [main, devops-pipeline, youssef]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/healthcare-fastapi
  PYTHON_VERSION: '3.11'

jobs:
  # =====================================================
  # STAGE 1: BUILD & INSTALL
  # =====================================================
  build-and-install:
    name: 📦 Build & Install
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: ⬇️ Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 📋 Packages
        run: pip list

  # =====================================================
  # STAGE 2: LINT & SECURITY
  # =====================================================
  lint-and-security:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest
    needs: build-and-install
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⬇️ Linters
        run: pip install flake8 bandit safety black

      - name: 🎨 Black
        run: black --check app/ || true

      - name: 🔎 Flake8
        run: |
          flake8 app/ --count --exit-zero --max-line-length=120
        continue-on-error: true

      - name: 🛡️ Bandit
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
        continue-on-error: true

      - name: 🔐 Safety
        run: safety check || true
        continue-on-error: true

      - name: 📊 Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # =====================================================
  # STAGE 3: TESTS ✅ FIX PRINCIPAL
  # =====================================================
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-security
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_healthcare_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: ⬇️ Dependencies + Tests
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio uvicorn[standard]

      - name: 🗃️ Wait PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user; then
              echo "✅ PostgreSQL ready"
              exit 0
            fi
            echo "⏳ PostgreSQL ($i/30)"
            sleep 2
          done
          echo "❌ PostgreSQL timeout"
          exit 1

      # ✅ FIX: DEBUG + AUTO-DISCOVERY TESTS
      - name: 🔍 Find test files
        run: |
          echo "=== TEST FILES ==="
          find . -name "test*.py" -type f || echo "No tests found"
          ls -la app/ 2>/dev/null || echo "No app/"
          ls -la tests/ 2>/dev/null || echo "No tests/"

      - name: 🧪 Run Tests
        env:
          TEST: true
          ENVIRONMENT: testing
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_healthcare_db
          SQLALCHEMY_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_healthcare_db
          SECRET_KEY: test_super_secret_key_very_long_for_ci_32_plus_chars_123456789
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # ✅ FIX: Trouve TOUS les test_*.py partout
          pytest . -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=40 || exit 1
          echo "✅ Tests OK!"

      - name: 📊 Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml

      - name: 📁 Coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: htmlcov/

  # =====================================================
  # STAGE 4: DOCKER
  # =====================================================
  build-docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================
  # STAGE 5: DEPLOY
  # =====================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build-docker
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.build-docker.result == 'success'
    steps:
      - name: 🚀 Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Deployed"

  # =====================================================
  # SUMMARY
  # =====================================================
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [build-and-install, lint-and-security, test, build-docker, deploy]
    if: always()
    steps:
      - name: 📊 Status
        run: |
          echo "# Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build-and-install.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint-and-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | ${{ needs.deploy.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
