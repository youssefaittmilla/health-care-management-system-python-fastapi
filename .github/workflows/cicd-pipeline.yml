name: Healthcare DevOps Pipeline

on:
  push:
    branches: [main, devops-pipeline, youssef]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/healthcare-fastapi
  PYTHON_VERSION: '3.11'

jobs:
  # =====================================================
  # STAGE 1: BUILD & INSTALL
  # =====================================================
  build-and-install:
    name: 📦 Build & Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: ⬇️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "✅ Dependencies OK"

      - name: 📋 List packages
        run: pip list

  # =====================================================
  # STAGE 2: LINT & SECURITY
  # =====================================================
  lint-and-security:
    name: 🔍 Lint & Security
    runs-on: ubuntu-latest
    needs: build-and-install
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python setup
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: ⬇️ Install linters
        run: pip install flake8 bandit safety pylint black

      - name: 🎨 Black check
        run: black --check app/
        continue-on-error: true

      - name: 🔎 Flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: 🛡️ Bandit
        run: |
          bandit -r app/ -ll -f json -o bandit-report.json
        continue-on-error: true

      - name: 🔐 Safety
        run: safety check --json
        continue-on-error: true

      - name: 📊 Upload Bandit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  # =====================================================
  # STAGE 3: TESTS (FIX YAML + tests/)
  # =====================================================
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-security
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_healthcare_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 💾 Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: ⬇️ Install + pytest
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio uvicorn[standard]

      - name: 🗃️ Wait PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U test_user; then
              echo "✅ PostgreSQL ready"
              break
            fi
            echo "⏳ PostgreSQL ($i/30)"
            sleep 2
          done || exit 1

      - name: 🔍 DEBUG: Trouver tests
        run: |
          echo "=== TEST FILES ==="
          find . -name "test_*.py" -type f || echo "Aucun test trouvé"
          echo "=== APP DIR ==="
          ls -la app/ 2>/dev/null || echo "Pas de app/"
          echo "=== TESTS DIR ==="
          ls -la tests/ 2>/dev/null || echo "Pas de tests/"

      - name: 🧪 Run Tests (FIX auto-discovery)
        env:
          TEST: "true"
          ENVIRONMENT: "testing"
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_healthcare_db
          SQLALCHEMY_DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_healthcare_db
          SECRET_KEY: test_super_secret_key_very_long_for_ci_32_plus_chars_123456789
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # FIX: pytest trouve TOUS les test_*.py
          pytest \
            -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            . \
          || (echo "❌ Tests KO!" && exit 1)

      - name: 📊 Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

      - name: 📁 Coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

  # =====================================================
  # STAGE 4: DOCKER
  # =====================================================
  build-docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: needs.test.result == 'success'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =====================================================
  # STAGE 5: DEPLOY
  # =====================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build-docker
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.build-docker.result == 'success'
    steps:
      - name: 🚀 Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Deploy déclenché"

  # =====================================================
  # SUMMARY
  # =====================================================
  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [build-and-install, lint-and-security, test, build-docker, deploy]
    if: always()
    steps:
      - name: 📊 Status
        run: |
          echo "| Build | ${{ needs.build-and-install.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.build-docker.result }} |" >> $GITHUB_STEP_SUMMARY
